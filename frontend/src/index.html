<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>BlackMagic - Flash Firmware</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Reboot Button -->
    <button class="reboot-btn" id="rebootBtn" title="Reboot Device">🔄</button>
    
    <h1>BlackMagic Probe</h1>
    
    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-button active" data-tab="flash">📥 Flash Firmware</button>
        <button class="tab-button" data-tab="settings">⚙️ Settings</button>
    </div>
    
    <!-- Flash Tab Content -->
    <div class="tab-content active" id="flash-tab">
        <div class='upload-form' id='uploadForm'>
            <h2>Select Firmware File</h2>
            <div class='drop-zone' id='dropZone'>
                <div class='drop-zone-text'>📁 Drag & Drop firmware file here</div>
                <div class='drop-zone-hint'>or click to browse</div>
            </div>
            <input type='file' id='fileInput' name='file' accept='.bin,.elf' style='display: none;'>
            <div id='fileInfo' class='file-info' style='display: none;'></div>
            
            <details id='advancedSettings' class='advanced-settings'>
                <summary>Advanced Settings</summary>
                <div class='settings-content'>
                    <div class='addr-input'>
                        <label for='baseAddr'>Flash Base Address (hex):</label>
                        <input type='text' id='baseAddr' value='0x08000000' pattern='0x[0-9A-Fa-f]{8}'>
                    </div>
                    <div class='iface-select'>
                        <label>Programming Interface:</label>
                        <div class='radio-group'>
                            <label class='radio-label'>
                                <input type='radio' name='iface' id='ifaceSwd' value='swd' checked>
                                SWD
                            </label>
                            <label class='radio-label'>
                                <input type='radio' name='iface' id='ifaceJtag' value='jtag'>
                                JTAG
                            </label>
                        </div>
                    </div>
                </div>
            </details>
            
            <form id='uploadFormElement' enctype='multipart/form-data'>
                <button type='submit' id='uploadBtn' disabled>Upload & Flash Target</button>
            </form>
            <div id='status'></div>
            <div class='progress' id='progressContainer' style='display:none;'>
                <div class='progress-bar' id='progressBar'></div>
            </div>
        </div>
    </div>
    
    <!-- Settings Tab Content -->
    <div class="tab-content" id="settings-tab">
        <div class='settings-form'>
            <h2>NVS Configuration</h2>
            <form id='settingsForm'>
                <div class='form-group'>
                    <label for='ssid'>Wi-Fi SSID:</label>
                    <input type='text' id='ssid' name='ssid' placeholder='Enter Wi-Fi SSID'>
                </div>
                
                <div class='form-group'>
                    <label for='pass'>Wi-Fi Password:</label>
                    <input type='password' id='pass' name='pass' placeholder='Enter Wi-Fi Password'>
                </div>
                
                <div class='form-group'>
                    <label for='hostname'>Hostname:</label>
                    <input type='text' id='hostname' name='hostname' placeholder='Enter hostname'>
                </div>
                
                <button type='submit' id='saveSettingsBtn'>Save Settings</button>
            </form>
            <div id='settingsStatus'></div>
        </div>

        <div class='settings-form' style='margin-top:24px;'>
            <h2>Pin Configuration</h2>
            <form id='pinsForm'>
                <div class='pin-grid'>
                    <div class='form-group'>
                        <label for='pinSwdio'>SWDIO / TMS:</label>
                        <input type='number' id='pinSwdio' name='swdio' min='0' max='30' value='23'>
                    </div>
                    <div class='form-group'>
                        <label for='pinSwclk'>SWCLK / TCK:</label>
                        <input type='number' id='pinSwclk' name='swclk' min='0' max='30' value='24'>
                    </div>
                    <div class='form-group'>
                        <label for='pinTdi'>TDI:</label>
                        <input type='number' id='pinTdi' name='tdi' min='0' max='30' value='28'>
                    </div>
                    <div class='form-group'>
                        <label for='pinTdo'>TDO / SWO:</label>
                        <input type='number' id='pinTdo' name='tdo' min='0' max='30' value='27'>
                    </div>
                    <div class='form-group'>
                        <label for='pinTrst'>TRST:</label>
                        <input type='number' id='pinTrst' name='trst' min='0' max='30' value='25'>
                    </div>
                </div>
                <button type='submit' id='savePinsBtn'>Save Pins</button>
            </form>
            <div id='pinsStatus'></div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
